<style>
:root{--p:#6B1A1A;--pd:#4A0F0F;--pl:#8B2E2E;--s:#A0522D;--a:#C9962A;--al:#E8B84B;--bg:#FDF5EE;--sur:#FFFFFF;--sur2:#FDF0E8;--bd:#E8D5C4;--tx:#2C1810;--tx2:#5C3D2E;--tx3:#9C7B6E;--r:12px;--rs:8px;--sh:0 2px 8px rgba(107,26,26,.1);--shl:0 8px 28px rgba(107,26,26,.15)}
*{margin:0;padding:0;box-sizing:border-box}
button,label{-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
input,select,textarea{-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:13.5px;line-height:1.6;-webkit-font-smoothing:antialiased;touch-action:manipulation;overscroll-behavior:none}
h1,h2,h3,h4{font-family:'Lora',serif;font-weight:700}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.sb{width:255px;background:linear-gradient(175deg,#3A0A0A 0%,#6B1A1A 45%,#8B2E2E 80%,#7A3520 100%);color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow-y:auto;display:flex;flex-direction:column}
.sb-head{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-logo-i{width:42px;height:42px;background:linear-gradient(135deg,#C9962A,#E8B84B);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sb-ttl{font-family:'Lora',serif;font-size:13px;font-weight:700;line-height:1.3;color:#fff}
.sb-sub{font-size:10px;opacity:.6}
.sb-usr{background:rgba(255,255,255,.1);border-radius:8px;padding:9px 11px;margin-top:8px}
.sb-usr-n{font-size:12px;font-weight:600}
.sb-usr-r{font-size:10px;opacity:.65}
.sb-nav{flex:1;padding:10px 8px}
.nav-sec{margin-bottom:14px}
.nav-sec-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;opacity:.45;padding:0 8px;margin-bottom:3px}
.nav-i{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;cursor:pointer;transition:all .18s;font-size:12.5px;margin-bottom:2px;color:rgba(255,255,255,.8)}
.nav-i:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-i.active{background:linear-gradient(135deg,#C9962A,#E8B84B);color:#3A0A0A;font-weight:600}
.nav-icon{font-size:15px;width:18px;text-align:center}
.sb-foot{padding:11px 14px;border-top:1px solid rgba(255,255,255,.1)}
.btn-out{width:100%;padding:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:7px;color:#fff;cursor:pointer;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s}
.btn-out:hover{background:rgba(220,38,38,.35)}
.mc{margin-left:255px;min-height:100vh;display:flex;flex-direction:column}
.tb{background:#fff;padding:11px 22px;border-bottom:1px solid var(--bd);border-top:3px solid var(--a);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-ttl{font-family:'Lora',serif;font-size:17px;color:var(--p);display:flex;align-items:center;gap:8px}
.tb-ttl::before{content:'';display:inline-block;width:4px;height:20px;background:linear-gradient(180deg,var(--p),var(--a));border-radius:2px}
.tb-r{display:flex;align-items:center;gap:10px}
.pc{padding:22px;flex:1}
.card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:15px}
.card-ttl{font-family:'Lora',serif;font-size:15px;color:var(--p);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--al);display:flex;align-items:center;justify-content:space-between}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.sc{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);border-left:4px solid var(--p);transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc.g{border-left-color:var(--s)}.sc.o{border-left-color:var(--a)}.sc.r{border-left-color:#8B1A1A}
.sv{font-size:27px;font-weight:700;color:var(--p)}.sc.g .sv{color:var(--s)}.sc.o .sv{color:var(--a)}.sc.r .sv{color:#8B1A1A}
.sl{font-size:11px;color:var(--tx3);margin-top:3px}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;font-weight:500;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-s{background:var(--s);color:#fff}.btn-s:hover{background:#7A3C1A}
.btn-a{background:linear-gradient(135deg,var(--a),var(--al));color:#3A0A0A;font-weight:700}.btn-a:hover{background:linear-gradient(135deg,var(--al),var(--a))}
.btn-d{background:#7B1A1A;color:#fff}.btn-d:hover{background:#5C1212}
.btn-o{background:transparent;border:1px solid var(--bd);color:var(--tx)}.btn-o:hover{background:var(--bg)}
.btn-sm{padding:4px 9px;font-size:11.5px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.fc{width:100%;padding:7px 11px;border:1px solid var(--bd);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;color:var(--tx);background:#fff;transition:border-color .18s}
.fc:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(107,26,26,.12)}
textarea.fc{resize:vertical;min-height:65px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.tw{overflow-x:auto;border-radius:var(--rs);box-shadow:var(--sh)}
table.dt{width:100%;border-collapse:collapse;background:#fff}
.dt th{background:linear-gradient(90deg,var(--p),#8B2E2E);color:#fff;padding:9px 11px;text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;position:sticky;top:0;z-index:1}
.dt td{padding:8px 11px;border-bottom:1px solid var(--bd);font-size:12.5px;vertical-align:middle}
.dt tr:hover td{background:var(--sur2)}
.dt tr:last-child td{border-bottom:none}
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:600}
.b-ok{background:#D5F5E3;color:#1A6B3A}.b-no{background:#FDECEA;color:#8B1A1A}.b-w{background:#FEF3C7;color:#78380F}.b-i{background:#DBEAFE;color:#1A3A7A}.b-g{background:#F1F3F5;color:#495057}
.tabs{display:flex;border-bottom:2px solid var(--bd);margin-bottom:18px;gap:3px;flex-wrap:wrap}
.tab{padding:7px 14px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--tx3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s}
.tab:hover{color:var(--p)}.tab.active{color:var(--p);border-bottom-color:var(--a);font-weight:600}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:1000;padding:18px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto}
.modal.lg{max-width:800px}
.mh{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mtt{font-family:'Lora',serif;font-size:15px;color:var(--p)}
.mc-btn{background:var(--bg);border:none;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--tx2)}
.mb{padding:18px 22px}
.mf{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.iki-hd{color:#fff;border-radius:var(--r);padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.iki-hd.i1{background:linear-gradient(135deg,#4A0F0F,#7B2020)}
.iki-hd.i2{background:linear-gradient(135deg,#5C1A00,#A0522D)}
.iki-hd.i3{background:linear-gradient(135deg,#5C3000,#C9962A)}
.iki-hd.i4{background:linear-gradient(135deg,#2A1A00,#8B6914)}
.iki-hd h2{font-family:'Lora',serif;font-size:19px;margin-bottom:4px}
.iki-hd p{font-size:11.5px;opacity:.82}
.iki-pv{font-size:30px;font-weight:700}
.iki-pl{font-size:10px;opacity:.8}
.pu-area{border:2px dashed var(--bd);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .18s}
.pu-area:hover{border-color:var(--p);background:rgba(10,61,98,.03)}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:9px}
.pt{aspect-ratio:1;border-radius:7px;overflow:hidden;position:relative}
.pt img{width:100%;height:100%;object-fit:cover}
.pt-del{position:absolute;top:3px;right:3px;background:rgba(231,76,60,.88);color:#fff;border:none;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.pb{background:var(--bd);border-radius:4px;height:7px;overflow:hidden}
.skeleton{background:linear-gradient(90deg,#f0e8e0 25%,#e8ddd6 50%,#f0e8e0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;height:14px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--tx3)}
.page-loading-spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
.pf{height:100%;border-radius:4px;background:var(--s);transition:width .3s}
.pf.w{background:var(--a)}.pf.r{background:#E74C3C}
.es{text-align:center;padding:38px;color:var(--tx3)}
.mb table{border-collapse:collapse;width:100%}
.mb .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:6px;margin-bottom:8px}
.mb .tbl-scroll table{min-width:360px}
.mb .tw-auto{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--rs)}
@media(max-width:768px){
  .mb{padding:12px 14px}
  .mb table{font-size:11px}
  .mb td,.mb th{padding:5px 7px}
}
.es .ei{font-size:44px;margin-bottom:11px}
.es h3{font-size:15px;margin-bottom:7px;color:var(--tx2)}
.alert-fl{position:fixed;top:14px;right:22px;z-index:9999;min-width:280px;padding:11px 14px;border-radius:9px;font-size:12.5px;box-shadow:0 4px 14px rgba(0,0,0,.18);display:flex;align-items:center;gap:8px}
.al-ok{background:#D5F5E3;color:#1A6B3A;border:1px solid #A9DFBF}
.al-er{background:#FDECEA;color:#8B1A1A;border:1px solid #F5B7B1}
.al-in{background:#DBEAFE;color:#1A3A7A;border:1px solid #A9CCE3}
.login-pg{min-height:100vh;background:linear-gradient(135deg,#3A0A0A 0%,#6B1A1A 40%,#A0522D 75%,#C9962A 100%);display:flex;align-items:center;justify-content:center;padding:18px}
.login-cd{background:#fff;border-radius:22px;padding:40px;width:100%;max-width:420px;box-shadow:0 24px 70px rgba(0,0,0,.35);border-top:4px solid var(--a)}
.login-logo-i{width:70px;height:70px;background:linear-gradient(135deg,#6B1A1A,#C9962A);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 12px}
.ms{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mo{padding:7px 11px;border:1px solid var(--bd);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;color:var(--tx);cursor:pointer;background:#fff}
@media print{
  /* Jika overlay print aktif: sembunyikan semua kecuali overlay */
  body:has(#print-overlay-root) > *:not(#print-overlay-root) {
    display:none!important;
  }
  body:has(#print-overlay-root) #print-overlay-root {
    position:static!important;overflow:visible!important;
  }
  /* Mode print biasa (tanpa overlay) – fallback */
  .no-print{display:none!important}
  body{font-family:Arial,sans-serif;font-size:10pt;color:#000;background:#fff}
  .sb,.tb,.tabs,.btn,.iki-hd{display:none!important}
  .mc{margin-left:0!important}
  .pc{padding:0!important}
  .card{box-shadow:none!important;border:none!important;margin:0!important}
  .print-hd{display:block!important}
  .dt th{background:#eee!important;color:#000!important;-webkit-print-color-adjust:exact}
  .pg{grid-template-columns:repeat(3,1fr)!important}
  .pt{height:100px!important}
  .sign-row{display:grid!important;grid-template-columns:1fr 1fr;gap:60px;margin-top:30px}
  .sign-box{text-align:center}
  .sign-line{border-bottom:1px solid #000;margin:40px 20px 4px}
  /* Tombol overlay tidak ikut tercetak */
  #print-overlay-close, #print-overlay-print { display:none!important; }
}
.print-hd{display:none}

    /* ===== MOBILE RESPONSIVE – IMPROVED ===== */
    .hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:6px;border:none;background:transparent;z-index:400}
    .hamburger span{display:block;width:22px;height:2px;background:var(--p);border-radius:2px;transition:all .3s}
    .overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}

    /* ===== BOTTOM NAVIGATION BAR ===== */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bd);z-index:250;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 10px rgba(107,26,26,.08)}
    .bottom-nav-items{display:flex;align-items:stretch;justify-content:space-around}
    .bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 4px;cursor:pointer;border:none;background:transparent;color:var(--tx3);font-family:'Plus Jakarta Sans',sans-serif;flex:1;transition:color .18s;position:relative;min-width:0;-webkit-tap-highlight-color:transparent}
    .bn-item:active{background:rgba(107,26,26,.06)}
    .bn-item.active{color:var(--p)}
    .bn-icon{font-size:19px;line-height:1;transition:transform .18s}
    .bn-lbl{font-size:9px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px;text-align:center}
    .bn-item.active .bn-icon{transform:scale(1.15)}
    .bn-item.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--p);border-radius:0 0 2px 2px}
    .bn-more-menu{display:none;position:absolute;bottom:calc(100% + 6px);right:-8px;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.18);border:1px solid var(--bd);min-width:210px;overflow:hidden;z-index:260}
    .bn-more-menu.open{display:block;animation:slideUpIn .18s ease}
    @keyframes slideUpIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .bn-more-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;font-size:13px;color:var(--tx);transition:background .15s;font-family:'Plus Jakarta Sans',sans-serif;border:none;background:transparent;width:100%;text-align:left}
    .bn-more-item:active{background:var(--bg)}
    .bn-more-item.active{color:var(--p);font-weight:600;background:rgba(107,26,26,.05)}
    .bn-mi-icon{font-size:16px;width:22px;text-align:center}
    .bn-divider{height:1px;background:var(--bd);margin:2px 0}

    /* ===== CARD TITLE WRAP FIX ===== */
    .card-ttl{flex-wrap:wrap;gap:6px}
    .card-ttl-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

    @media(max-width:480px){
  /* Tabel IKI di HP kecil */
  .dt th,.dt td{padding:4px 6px!important;font-size:10.5px!important}
  .dt .bdg{font-size:9px!important;padding:1px 5px!important}
  .dt img.photo-thumb{width:28px!important;height:28px!important}
  /* Sembunyikan kolom kurang penting di layar sangat sempit */
  .dt .col-hide-xs{display:none!important}
}
@media(max-width:768px){
      /* Sidebar slide-in */
      .sb{width:280px;left:-280px;transition:left .28s ease;position:fixed;z-index:300}
      .sb.open{left:0}
      .overlay-bg.show{display:block}
      .mc{margin-left:0!important}
      .hamburger{display:flex}

      /* Topbar */
      .tb{padding:8px 12px;gap:6px;flex-wrap:nowrap;align-items:center}

      .tb-ttl::before{display:none}
      .tb-r{gap:5px;flex-shrink:0}
      .mo{font-size:12px;padding:5px 7px;max-width:130px}

      /* Main content – extra bottom padding for bottom nav */

      .sg{grid-template-columns:1fr 1fr;gap:10px}

      .sv{font-size:22px}

      /* Dashboard 2-col stacks to 1-col */
      .dash-grid-2{grid-template-columns:1fr!important}

      /* Modals as bottom sheets */
      .modal{max-width:100%!important;margin:0;border-radius:16px 16px 0 0;max-height:95vh}
      .ov{align-items:flex-end;padding:0}
      .modal.lg{max-width:100%!important}

      /* Form grids */
      .fg2,.fg3{grid-template-columns:1fr!important}
      .ms{grid-template-columns:1fr!important;gap:10px}

      /* IKI page headers */
      .iki-hd{flex-direction:column;gap:8px;padding:14px;text-align:center}

      .iki-hd p{font-size:11px}

      /* Tabs horizontal scroll */
      .tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
      .tabs::-webkit-scrollbar{height:0}

      /* Photo grid */
      .pg{grid-template-columns:repeat(3,1fr)!important}

      /* Tables */
      table.dt{font-size:11px}
      .dt th,.dt td{padding:5px 7px}

      .btn{padding:7px 12px;font-size:12px}

      /* Signature row */
      .sign-row{grid-template-columns:1fr 1fr;gap:20px}

      /* Table horizontal scroll */
      .tw{-webkit-overflow-scrolling:touch;overflow-x:auto}

      /* Special elements */
      #nom-search{width:100%!important}
      .mh{padding:14px 16px 10px}
      .mb{padding:14px 16px}
      .mf{padding:10px 16px}
      .mtt{font-size:14px}
      .btn-out{font-size:11.5px;padding:7px}

      /* Photo delete touch target */
      .pt-del{width:26px!important;height:26px!important;font-size:14px!important}

      /* Show bottom nav */

<script>
// ================================================================
// GAS API CONFIG

var GAS_URL = 'https://script.google.com/macros/s/AKfycbyTyPtq2RoMuWYUnPb2PD5pWZCTtvg6vJ_Nhn5VjGzo6G0mC1O_p-P0wm36ZbwvjMrJ/exec';

const API_TOKEN = 'DILAPORKAN_2026_BDPASURUAN';  // security token

// ================================================================
// CUSTOM CONFIRM DIALOG (mobile-friendly bottom sheet)
// ================================================================
function confirmDialog(msg) {
  return new Promise(resolve => {
    // Desktop: native confirm (cepat & familiar)
    if (window.innerWidth > 768) { resolve(window.confirm(msg)); return; }
    // Mobile: bottom sheet agar mudah dijangkau jempol
    document.querySelectorAll('.cdlg-ov').forEach(e => e.remove());
    const ov = document.createElement('div');
    ov.className = 'ov cdlg-ov';
    ov.style.cssText = 'z-index:9999;align-items:flex-end;padding:0';
    ov.innerHTML = `<div class="cdlg-sheet">
      <div class="cdlg-handle"></div>
      <p class="cdlg-msg">${msg.replace(/\n/g,'<br>')}</p>
      <div class="cdlg-btns">
        <button class="btn btn-o" id="cdlg-no">Batal</button>
        <button class="btn btn-d" id="cdlg-yes">Ya, Lanjutkan</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    const done = v => { ov.remove(); resolve(v); };
    ov.querySelector('#cdlg-yes').onclick = () => done(true);
    ov.querySelector('#cdlg-no').onclick  = () => done(false);
    ov.addEventListener('click', e => { if(e.target===ov) done(false); });
  });
}

// ================================================================
// PHOTO THUMBNAIL CELL – tampilkan thumbnail di tabel
// ================================================================
function photoCell(photos) {
  if (!photos || !photos.length) return '-';
  const p0 = photos[0];
  const src = getPhotoSrc(p0);
  const thumb = src
    ? `<img src="${src}" class="photo-thumb" loading="lazy" onerror="this.style.display='none'">`
    : '';
  const badge = photos.length > 1
    ? `<span class="bdg b-i" style="font-size:9.5px">+${photos.length-1}</span>`
    : '';
  return `<div class="photo-cell">${thumb}${badge||(!thumb?`<span class="bdg b-i">📷${photos.length}</span>`:'')}</div>`;
}

// ================================================================
// DRAFT AUTO-SAVE – simpan draft form ke localStorage tiap 30 detik
// ================================================================
const DRAFT_KEY = 'dlp_draft_';
function saveDraft(formId, fields) {
  try {
    const data = {};
    fields.forEach(id => {
      const el = document.getElementById(id);
      if (el) data[id] = el.type === 'checkbox' ? el.checked : el.value;
    });
    localStorage.setItem(DRAFT_KEY + formId, JSON.stringify({data, ts: Date.now()}));
    // Tampilkan badge "Draft tersimpan"
    document.querySelectorAll('.draft-saved').forEach(e => e.remove());
    const b = document.createElement('div');
    b.className = 'draft-saved';
    b.textContent = '💾 Draft tersimpan';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 2200);
  } catch(e) {}
}
function loadDraft(formId) {
  try {
    const d = JSON.parse(localStorage.getItem(DRAFT_KEY + formId) || 'null');
    if (!d || Date.now() - d.ts > 86400000) { clearDraft(formId); return null; }
    return d.data;
  } catch(e) { return null; }
}
function clearDraft(formId) {
  try { localStorage.removeItem(DRAFT_KEY + formId); } catch(e) {}
}
function applyDraft(formId, fields) {
  const draft = loadDraft(formId);
  if (!draft) return false;
  let applied = 0;
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (el && draft[id] !== undefined) {
      if (el.type === 'checkbox') el.checked = draft[id];
      else el.value = draft[id];
      applied++;
    }
  });
  if (applied > 0) showAlert(`📋 Draft form ditemukan – data sebelumnya dipulihkan.`,'in');
  return applied > 0;
}
// Auto-save setiap 30 detik selama modal terbuka
let _draftTimer = null;
function startDraftTimer(formId, fields) {
  stopDraftTimer();
  _draftTimer = setInterval(() => { if(document.getElementById(fields[0])) saveDraft(formId, fields); else stopDraftTimer(); }, 30000);
}
function stopDraftTimer() { if(_draftTimer){ clearInterval(_draftTimer); _draftTimer=null; } }

// ================================================================
// OFFLINE QUEUE – simpan data ke localStorage jika jaringan mati
// ================================================================
const OQ_KEY = 'dlp_offline_queue';
function getOfflineQueue() {
  try { return JSON.parse(localStorage.getItem(OQ_KEY) || '[]'); } catch(e) { return []; }
}
function addToOfflineQueue(action, payload) {
  const q = getOfflineQueue();
  q.push({action, payload, ts: Date.now(), id: 'oq_' + Date.now()});
  localStorage.setItem(OQ_KEY, JSON.stringify(q));
  updateOfflineBadge();
  showAlert('📴 Jaringan tidak ada. Data disimpan lokal, otomatis sync saat online.','in');
}
function updateOfflineBadge() {
  const q = getOfflineQueue();
  let badge = document.getElementById('offline-badge');
  if (q.length === 0) { if(badge) badge.remove(); return; }
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'offline-badge';
    badge.className = 'offline-badge';
    badge.onclick = syncOfflineQueue;
    document.body.appendChild(badge);
  }
  badge.innerHTML = `📴 ${q.length} data offline – ketuk untuk sync`;
}
async function syncOfflineQueue() {
  const q = getOfflineQueue();
  if (!q.length) return;
  showAlert(`📡 Sinkronisasi ${q.length} data offline...`,'in');
  const remaining = [];
  for (const item of q) {
    try {
      const res = await gasPost(item.action, item.payload);
      if (!res.success) remaining.push(item);
    } catch(e) { remaining.push(item); }
  }
  localStorage.setItem(OQ_KEY, JSON.stringify(remaining));
  updateOfflineBadge();
  if (remaining.length < q.length) {
    showAlert(`✅ ${q.length - remaining.length} data berhasil disinkronkan`,'ok');
    await loadFromGAS(S.selMonth);
  }
}
// Monitor koneksi internet
window.addEventListener('online',  () => { syncOfflineQueue(); showNetworkStatus(true);  });
window.addEventListener('offline', () => showNetworkStatus(false));
function showNetworkStatus(isOnline) {
  document.querySelectorAll('.net-badge').forEach(e => e.remove());
  const b = document.createElement('div');
  b.className = 'offline-badge net-badge ' + (isOnline ? 'online-badge' : '');
  b.textContent = isOnline ? '✅ Kembali online' : '📴 Tidak ada jaringan';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 3500);
}

async function gasPost(action, payload={}) {
  if (!GAS_URL) return {success:false,error:'No GAS URL'};
  try {
    const _nip = (S && S.user && S.user.nip) ? S.user.nip : '';
    const ctrl = new AbortController();
    // FIX v4.2: timeout per jenis aksi
    // uploadPhoto  → 90s  (decode base64 + Drive API)
    // autoRecover  → 180s (scan semua folder Drive)
    // aksi lain    → 45s
    const longActions = {uploadPhoto:90000, autoRecoverPhotos:180000, autoRecoverMonth:180000};
    const tid = setTimeout(() => ctrl.abort(), longActions[action] || 45000);
    const r = await fetch(GAS_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action, token:API_TOKEN, _nip, ...payload}),
      signal: ctrl.signal
    });
    clearTimeout(tid);
    const text = await r.text();
    if (!text || text.trim() === '') return {success:false, error:'Response kosong'};
    try { return JSON.parse(text); }
    catch(pe) {
      const m = text.match(/\{.*\}/s);
      if (m) { try { return JSON.parse(m[0]); } catch(e2) {} }
      return {success:false, error:'Response tidak valid: '+text.substring(0,80)};
    }
  } catch(e) {
    const isTO = e.name==='AbortError';
    console.warn('gasPost ['+action+'] error:', e.message);
    return {success:false, error: isTO ? 'Timeout – coba lagi' : e.message};
  }
}

// GET dari GAS – robust: baca text dulu baru parse JSON
// Mengatasi masalah GAS redirect ke scriptusercontent.com (Content-Type: text/plain)
async function gasGet(action, params={}) {
  if (!GAS_URL) return null;
  try {
    const url = new URL(GAS_URL);
    url.searchParams.set('action', action);
    url.searchParams.set('token', API_TOKEN);
    url.searchParams.set('_cb', Date.now());
    Object.entries(params).forEach(([k,v]) => { if(v!==undefined&&v!==null) url.searchParams.set(k, String(v)); });
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 45000);
    const r = await fetch(url.toString(), {redirect:'follow', cache:'no-store', signal: ctrl.signal});
    clearTimeout(tid);
    if (!r.ok) throw new Error('HTTP '+r.status);
    // Baca sebagai text dulu agar robust terhadap redirect GAS
    const text = await r.text();
    if (!text || text.trim() === '') throw new Error('Response kosong dari server');
    let json;
    try { json = JSON.parse(text); }
    catch(pe) {
      // Coba ekstrak JSON dari response yang mungkin punya prefix
      const m = text.match(/\{.*\}/s);
      if (m) { try { json = JSON.parse(m[0]); } catch(e2) {} }
      if (!json) throw new Error('Response tidak valid: '+text.substring(0,100));
    }
    return json.success ? json.data : null;
  } catch(e) {
    console.warn('gasGet ['+action+'] error:', e.message);
    return null;
  }
}

// Simpan ke GAS dengan konfirmasi (BUKAN no-cors – bisa baca response)
async function gasSavePost(action, payload={}) {
  const res = await gasPost(action, payload);
  if (!res.success) {
    // Jika timeout/network error → simpan ke offline queue
    const isNetworkErr = res.error && (res.error.includes('Timeout') || res.error.includes('fetch') || res.error.includes('network') || !navigator.onLine);
    // Jangan queue action yang bukan save (delete, repair, dll)
    const isSaveAction = action.startsWith('save') || action.startsWith('update');
    if (isNetworkErr && isSaveAction) {
      addToOfflineQueue(action, payload);
      return { success: false, error: 'Data disimpan offline. Akan sync otomatis saat online.', offline: true };
    }
    console.warn('gasSave GAGAL ['+action+']:', res.error);
    showAlert('⚠️ Gagal sinkronisasi ke server: '+( res.error||'unknown'), 'er');
  }
  return res;
}

// Upload foto ke Google Drive via GAS, kembalikan URL thumbnail
// ROOT CAUSE FIX: gasPost return {success, data:{...}}
// Harus akses res.data.url bukan res.url langsung
async function uploadPhoto(base64Data, filename, label) {
  if (!GAS_URL || !base64Data) return null;
  try {
    showSyncIndicator(true, '📷 Upload foto ke Drive...');
    const res = await gasPost('uploadPhoto', {
      data: base64Data,
      filename: filename||('foto_'+Date.now()+'.jpg'),
      label: label||'Foto',
      context: filename||'Foto'
    });
    showSyncIndicator(false);
    // FIX: data ada di res.data bukan res langsung
    const d = res.data || res;
    if (res.success && (d.url || d.fileId || d.id)) {
      const fileId = d.fileId || d.id || '';
      // v3.9: simpan sebagai thumbnail URL (lebih reliable dari lh3 yang dibatasi Google)
      // FIX v4.0: gunakan uc?export=view bukan /thumbnail yang butuh login
      const url    = fileId ? 'https://drive.google.com/uc?export=view&id='+fileId
                            : (d.url || '');
      const viewUrl = d.viewUrl || (fileId ? 'https://drive.google.com/file/d/'+fileId+'/view' : '');
      console.log('[upload] OK fileId='+fileId+' url='+url);
      return { url, viewUrl, id: fileId, label: label||'Foto' };
    }
    console.warn('[upload] Gagal:', res.error || 'no url/fileId in response', res);
    return null;
  } catch(e) {
    showSyncIndicator(false);
    console.warn('uploadPhoto error:', e);
    return null;
  }
}

// Upload semua tempPhotos ke Drive, kembalikan array {url,viewUrl,label}
// FIX v4.0: foto gagal upload TIDAK disimpan ke spreadsheet (mencegah url kosong).
//           base64 tetap dicache lokal agar tampil di session ini.
async function uploadAllPhotos(context) {
  const uploaded = [];
  for (let i=0; i<tempPhotos.length; i++) {
    const p = tempPhotos[i];

    // FIX: Foto local:true (upload Drive sebelumnya gagal) → coba upload ulang
    if (p.local && (p.thumb || p.d)) {
      const fn = (context||'foto')+'_retry_'+Date.now()+'_'+i+'.jpg';
      // FIX v4.2: kompres juga sebelum retry agar tidak timeout
      const retryData = await compressImage(p.thumb||p.d||'', 400, 0.65);
      const res = await uploadPhoto(retryData, fn, p.l||p.label||'Foto');
      if (res && res.url) {
        const vu = res.viewUrl||res.url;
        cachePhotoThumb(res.url, retryData, vu);
        uploaded.push({url:res.url, viewUrl:vu, id:res.id||res.fileId, thumb:retryData, label:p.l||p.label||'Foto'});
        continue;
      }
      // FIX v4.0: upload masih gagal → JANGAN simpan ke spreadsheet (url kosong = foto rusak)
      console.warn('[uploadAllPhotos] Upload retry gagal – foto TIDAK disimpan ke spreadsheet');
      continue; // skip – tidak masuk uploaded
    }

    // Foto lama dari Drive: sudah punya url → teruskan beserta thumb dan viewUrl
    if (p.url && !p.d) {
      const cachedThumb = p.thumb || getCachedThumb(p.url) || '';
      const resolvedViewUrl = p.viewUrl || getCachedViewUrl(p.url) || p.url;
      uploaded.push({
        url: p.url,
        viewUrl: resolvedViewUrl,
        label: p.label||p.l||'Foto',
        thumb: cachedThumb
      });
      continue;
    }

    const fn = (context||'foto')+'_'+Date.now()+'_'+i+'.jpg';
    const thumb = await compressImage(p.d||'', 300, 0.7);
    // FIX v4.2: kompres agresif ke 400px/0.65 sebelum upload
    // → file ~15-25KB base64 → GAS selesai dalam 15-25 detik, jauh di bawah 90s timeout
    const uploadData = await compressImage(p.d||'', 400, 0.65);
    const res = await uploadPhoto(uploadData, fn, p.l||p.label||'Foto');
    if (res && res.url) {
      const vu = res.viewUrl||res.url;
      cachePhotoThumb(res.url, thumb, vu);
      uploaded.push({url:res.url, viewUrl:vu, id:res.id||res.fileId, thumb, label:p.l||p.label||'Foto'});
    } else {
      // FIX v4.0: upload baru gagal → JANGAN simpan url kosong ke spreadsheet
      const fullThumb = await compressImage(p.d||'', 800, 0.85);
      if (fullThumb || p.d) {
        // Cache base64 sementara agar foto tampil di session ini
        const tmpKey = 'local_'+context+'_'+i+'_'+Date.now();
        if (typeof _photoThumbCache !== 'undefined') _photoThumbCache[tmpKey] = fullThumb || p.d;
      }
      console.warn('[uploadAllPhotos] Upload gagal – foto TIDAK disimpan ke spreadsheet');
      // TIDAK push ke uploaded → photos di spreadsheet tetap bersih
    }
  }
  return uploaded;
}

// Load semua data dari GAS (sumber kebenaran tunggal = Spreadsheet)
async function loadFromGAS(month) {
  if (!GAS_URL) return;
  showSyncIndicator(true, '🔄 Memuat data dari server...');
  try {
    const m = month || S.selMonth;
    // OPTIMASI: 1 request getAll menggantikan 14 request terpisah
    // Mengurangi cold-start overhead & latency secara signifikan
    const all = await gasGet('getAll', {month:m, nip: S.user ? S.user.nip : ''});
    if (!all) throw new Error('Tidak ada respons dari server');
    const i1=all.i1||[], i2=all.i2||[], i3=all.i3||[], i3a=all.i3a||[], i3s=all.i3s||[];
    const i4=all.i4||[], i4sp=all.i4sp||[], i4st=all.i4st||[];
    const rr=all.rr||[], rm=all.rm||[], bc=all.bc||[];
    const m10=all.m10, users=all.users||[], belanja=all.belanja||[];

    // Helper: normalisasi photos ke array untuk semua entry (mencegah bug .map/.filter)
    const normPhotos = (arr) => (arr||[]).map(e => {
      if(e && e.photos !== undefined) e.photos = safePhotos(e.photos);
      return e;
    });

    // Helper: dedup by id, keep latest (last occurrence wins)
    const dedup = (arr) => {
      if (!arr||!arr.length) return [];
      const map = new Map();
      arr.forEach(e => { if(e&&e.id) map.set(String(e.id), e); });
      return Array.from(map.values());
    };

    // Normalize sarpras kat field (GAS simpan kat_A/B/C/D/E → nested)
    const normSarpras = (arr) => dedup(arr||[]).map(e => {
      if (e.kat_A !== undefined && typeof e.kat !== 'object') {
        e.kat = {A:e.kat_A||'ok',B:e.kat_B||'ok',C:e.kat_C||'ok',D:e.kat_D||'ok',E:e.kat_E||'ok'};
      }
      // Pastikan jml_masalah selalu number
      if (typeof e.jml_masalah !== 'number') e.jml_masalah = parseInt(e.jml_masalah)||0;
      if (typeof e.jml_dicek !== 'number') e.jml_dicek = parseInt(e.jml_dicek)||46;
      // Pastikan itemNamesByKat selalu object (GAS mungkin kirim sebagai JSON string)
      if (e.itemNamesByKat && typeof e.itemNamesByKat === 'string') {
        try { e.itemNamesByKat = JSON.parse(e.itemNamesByKat); } catch(err) { e.itemNamesByKat = {}; }
      }
      if (!e.itemNamesByKat || typeof e.itemNamesByKat !== 'object') e.itemNamesByKat = {};
      return e;
    });

    // Filter data per operator jika role adalah operator
    const isOprFilter = S.user && S.user.role === 'operator';
    const opName = S.user ? S.user.name : '';
    const opUn   = S.user ? S.user.un   : '';
    const opNip  = S.user ? S.user.nip  : '';

    // filterByOp: pisahkan data per operator berdasarkan nama, username, ATAU nip
    // nipField = nama kolom nip di entry (mis. 'operator_nip' atau 'petugas_nip')
    const filterByOp = (arr, nameField, nipField) => {
      if (!isOprFilter) return dedup(arr||[]);
      return dedup((arr||[]).filter(e=>{
        const nm  = e[nameField] || '';
        const nip = nipField ? (e[nipField] || '') : '';
        // Cocok jika: nama sama, username sama, ATAU nip sama (paling andal)
        return nm===opName || nm===opUn || (opNip && nip && nip===opNip);
      }));
    };
    const upd = {
      i1:       normPhotos(filterByOp(i1,   'operator', 'operator_nip')),
      i2:       normPhotos(filterByOp(i2,   'operator', 'operator_nip')),
      i3:       normPhotos(filterByOp(i3,   'petugas',  'petugas_nip')),
      i3_alat:  normPhotos(filterByOp(i3a,  'petugas',  'petugas_nip')),
      i3_san:   filterByOp(i3s,  'petugas',  'petugas_nip'),
      i4:       normPhotos(filterByOp(i4,   'operator', 'operator_nip')),
      i4_sarpras: normPhotos(normSarpras(isOprFilter
        ? (i4sp||[]).filter(e=>{
            const nm=e.petugas||''; const nip=e.petugas_nip||'';
            return nm===opName||nm===opUn||(opNip&&nip&&nip===opNip);
          })
        : (i4sp||[]))),
      i4_stok:  filterByOp(i4st, 'petugas',  'petugas_nip'),
      regRusak:    dedup((rr||[]).filter(r=>r.tgl)),
      regMasalah:  dedup((rm||[]).filter(r=>r.tgl)),
      i1_bahan_custom: bc||[],
    };
    if (m10 && m10.length) upd.menu10 = m10;
    // Update users dari GAS (jangan overwrite password lokal jika GAS tidak kirim pw)
    if (users && users.length) {
      upd.users = users.map(u => ({
        id:u.id, un:u.un||u.username, name:u.name,
        nip:u.nip, nipT:u.nipT||u.nipType||'NIP',
        role:u.role, jabatan:u.jabatan, unit:u.unit||'Semua',
        // Pertahankan pw lokal jika GAS tidak kirim (keamanan)
        pw: S.users.find(x=>x.id==u.id)?.pw || u.pw || ''
      }));
    }
    // Load belanja dari GAS – merge dengan belanja bulan lain yang sudah ada
    if (belanja && belanja.length) {
      // FIX: normalisasi periode → number, bulan → string, nip → string
      const userNip = S.user ? S.user.nip : '';
      const belanjaNorm = belanja.map(b=>({
        ...b,
        periode: parseInt(b.periode)||b.periode,
        bulan: b.bulan ? String(b.bulan).substring(0,7).trim() : m,
        nip: b.nip || userNip
      }));
      const belanjaDenganBulan = belanjaNorm;
      // Merge: pertahankan data bulan lain (milik user ini), replace bulan ini
      const existing = (S.i1_belanja||[]).filter(b=>b.bulan && b.bulan!==m);
      upd.i1_belanja = [...existing, ...belanjaDenganBulan];
      // ================================================================
      // PROTEKSI v3.7: catat jumlah pengiriman maksimum yang ter-load dari GAS
      // agar saveBelanja() tidak overwrite dengan data yang lebih sedikit
      // ================================================================
      const maxPg = belanjaDenganBulan.reduce((sum,b)=>sum+(b.pengiriman_basah||[]).length,0);
      S._belanjaMaxPengiriman = Math.max(S._belanjaMaxPengiriman||0, maxPg);
      // FIX: setelah load dari GAS berhasil, izinkan save berikutnya tanpa perlu interaksi ekstra
      S._belanjaSaveAllowed = true;
    }

    // ================================================================
    // FIX SYNC BAHAN STATUS: load status ceklist bahan per bulan dari GAS
    // agar sinkron antar device & reset otomatis saat pindah bulan baru
    // ================================================================
    if (S.user && S.user.nip && GAS_URL) {
      try {
        const bahanSt = await gasGet('getBahanStatus', { month: m, nip: S.user.nip });
        if (bahanSt && typeof bahanSt === 'object' && !Array.isArray(bahanSt)) {
          upd.i1_bahan_status = bahanSt;
        } else {
          // Bulan baru atau belum pernah disimpan → reset semua ke default 'ok'
          upd.i1_bahan_status = {};
        }
      } catch(e) {
        // Tidak fatal – biarkan state lama
        console.warn('loadBahanStatus error:', e);
      }
    }

    // ================================================================
    // PERBAIKAN: Pertahankan thumb/base64 foto lokal setelah reload dari GAS
    // GAS tidak menyimpan base64, jadi kita cache dari state lama sebelum replace.
    // Cache ganda: per (entry_id + index) DAN per url → tahan terhadap perubahan urutan.
    // ================================================================
    const PHOTO_KEYS = ['i1','i2','i3','i3_alat','i3_san','i4','i4_sarpras'];
    // _thumbByIdx  : { entryId: [{thumb, viewUrl, url}, ...] } – cocok berdasarkan posisi
    // _thumbByUrl  : { photoUrl: {thumb, viewUrl} }            – cocok berdasarkan url Drive
    const _thumbByIdx = {}, _thumbByUrl = {};
    PHOTO_KEYS.forEach(k => {
      (S[k]||[]).forEach(e => {
        if (!e || !e.id || !e.photos || !e.photos.length) return;
        _thumbByIdx[String(e.id)] = e.photos.map(p => ({
          thumb: p.thumb||p.d||'',
          viewUrl: p.viewUrl||p.url||'', // FIX: fallback ke url jika viewUrl kosong
          url: p.url||''
        }));
        e.photos.forEach(p => {
          const urlKey = (p.url||'').replace(/[&?]_cb=[^&]*/,'').trim();
          if (urlKey) {
            // FIX: simpan juga viewUrl per url agar tidak hilang setelah reload GAS
            _thumbByUrl[urlKey] = {
              thumb: p.thumb||p.d||'',
              viewUrl: p.viewUrl||p.url||''
            };
            // Sekaligus update localStorage cache jika ada thumb
            if (p.thumb && p.thumb.startsWith('data:')) cachePhotoThumb(urlKey, p.thumb);
          }
        });
      });
    });
    // Merge thumb + viewUrl lokal kembali ke data dari GAS
    PHOTO_KEYS.forEach(k => {
      if (!upd[k]) return;
      upd[k] = upd[k].map(e => {
        if (!e || !e.id) return e;
        const byIdx = _thumbByIdx[String(e.id)];
        return {
          ...e,
          photos: (e.photos||[]).map((p, idx) => {
            const urlKey = (p.url||'').replace(/[&?]_cb=[^&]*/,'').trim();
            const byIdxEntry = byIdx && byIdx[idx] ? byIdx[idx] : null;
            const byUrlEntry = urlKey ? (_thumbByUrl[urlKey]||null) : null;

            // Thumb: by-index -> by-url -> localStorage cache
            const thumbByIdx = byIdxEntry ? byIdxEntry.thumb : '';
            const thumbByUrl = byUrlEntry ? byUrlEntry.thumb : '';
            const thumbCache = getCachedThumb(urlKey);

            // FIX: viewUrl dipulihkan dari semua sumber cache
            // Ini penyebab "Lihat di Drive" hilang di PDF setelah logout/login
            const resolvedViewUrl = p.viewUrl
              || (byIdxEntry ? byIdxEntry.viewUrl : '')
              || (byUrlEntry ? byUrlEntry.viewUrl : '')
              || p.url || '';

            return {
              ...p,
              thumb: p.thumb || thumbByIdx || thumbByUrl || thumbCache || '',
              viewUrl: resolvedViewUrl
            };
          })
        };
      });
    });

    Object.assign(S, upd);

    // Load setelan sistem jika admin (setelah state diupdate)
    if (S.user && S.user.role === 'admin' && GAS_URL) {
      try {
        const settingsRes = await gasGet('getSettings', {});
        if (settingsRes && typeof settingsRes === 'object') {
          S.sysSettings = settingsRes;
        }
      } catch(e) { console.warn('loadSettings error:', e); }
    }

    render();

    showSyncIndicator(false);
    showAlert('✅ Data berhasil dimuat dari server');
  } catch(e) {
    console.error('loadFromGAS error:', e);
    showSyncIndicator(false, '❌ Gagal memuat data');
    const isOffline = !navigator.onLine;
    const isTimeout = e.name === 'AbortError';
    const msg = isOffline
      ? '📶 Tidak ada koneksi internet. Pastikan HP terhubung WiFi/data.'
      : isTimeout
        ? '⏱️ Server terlalu lama merespons. Coba lagi dalam beberapa detik.'
        : '❌ Gagal memuat data dari server. Coba lagi.';
    showAlert(msg, 'er');
  }
}

function showSyncIndicator(show, msg) {
  let el = document.getElementById('sync-ind');
  if (!el) return;
  if (show) { el.style.display='flex'; el.textContent=msg||'⏳ Sinkronisasi...'; }
  else { el.style.display='none'; }
}

function saveSession() {
  try {

      user: S.user ? {id:S.user.id,un:S.user.un,name:S.user.name,nip:S.user.nip,nipT:S.user.nipT,role:S.user.role,jabatan:S.user.jabatan,unit:S.user.unit} : null,

      _belanjaMaxPengiriman: S._belanjaMaxPengiriman||0,
      _belanjaSaveAllowed: S._belanjaSaveAllowed||false
    };
    sessionStorage.setItem('dilaporkan_sess', JSON.stringify(sess));
  } catch(e){}
}
function loadSession() {
  try {
    const raw = sessionStorage.getItem('dilaporkan_sess');
    if (!raw) return false;
    const sess = JSON.parse(raw);
    // Auto-logout setelah 10 jam
    const sessionAge = Date.now() - (sess.loginTime||0);
    if (sessionAge > 10*3600*1000) {
      sessionStorage.removeItem('dilaporkan_sess');
      return false;
    }
    // Warning 30 menit sebelum session habis
    if (sessionAge > 9.5*3600*1000) {
      setTimeout(()=>showAlert('⚠️ Session akan berakhir dalam 30 menit. Simpan pekerjaan Anda.','in'), 2000);
    }
    if (sess.user) {
      S.user = sess.user;
      S.page = 'dashboard';
      S.selMonth = sess.selMonth || S.selMonth;
      // FIX: restore data belanja dari session (tersedia sebelum load GAS selesai)
      if (sess.i1_belanja && sess.i1_belanja.length) {
        S.i1_belanja = sess.i1_belanja.map(b=>({...b, periode:parseInt(b.periode)||b.periode}));
        S.i1_belanja_per = sess.i1_belanja_per || 1;
        S._belanjaMaxPengiriman = sess._belanjaMaxPengiriman || 0;
        S._belanjaSaveAllowed = sess._belanjaSaveAllowed || false;
      }
      return true;
    }
  } catch(e){}
  return false;
}

const _photoThumbCache = {};

// Restore cache dari localStorage saat halaman pertama dibuka
(function() {

    Object.keys(stored).forEach(k => {

    });
  } catch(e) {}
})();

// Bersihkan cache jika terlalu besar (>200 entri → pangkas ke 150 terbaru)
function prunePhotoCache() {
  try {
    const stored = JSON.parse(localStorage.getItem('dilaporkan_photo_cache')||'{}');
    const keys = Object.keys(stored);
    if (keys.length > 200) {
      const pruned = {};
      keys.slice(-150).forEach(k => { pruned[k] = stored[k]; });
      localStorage.setItem('dilaporkan_photo_cache', JSON.stringify(pruned));
      Object.keys(_photoThumbCache).forEach(k => { if (!pruned[k]) delete _photoThumbCache[k]; });
    }
  } catch(e) {}
}

// Simpan thumb + viewUrl ke cache global + localStorage
// FIX: juga menyimpan viewUrl agar link "Lihat di Drive" tidak hilang setelah logout/login
function cachePhotoThumb(url, thumb, viewUrl) {
  if (!url) return;
  var fileId = extractDriveId(url);
  var normUrl = (url).replace(/[?&]_cb=[^&]*/,'').replace(/[?&]usp=[^&]*/,'').trim();
  var keys = [];
  if (fileId) keys.push('fid:'+fileId);
  if (normUrl) keys.push(normUrl);
  if (url !== normUrl) keys.push(url);
  if (thumb && thumb.startsWith('data:')) {
    keys.forEach(function(k){ if(k) _photoThumbCache[k]=thumb; });
  }
  try {
    var stored = JSON.parse(localStorage.getItem('dilaporkan_photo_cache')||'{}');
    var payload = {};
    if (thumb && thumb.startsWith('data:')) payload.thumb = thumb;
    if (viewUrl) payload.viewUrl = viewUrl;
    if (fileId) payload.fileId = fileId;
    payload.url = url;
    keys.forEach(function(k){ if(k){ stored[k]=Object.assign({},stored[k]||{},payload); }});
    localStorage.setItem('dilaporkan_photo_cache', JSON.stringify(stored));
    prunePhotoCache();
  } catch(e) {}
}

// Ambil thumb dari cache (RAM dulu, fallback localStorage)
function getCachedThumb(url) {
  if (!url) return '';
  var fileId = extractDriveId(url);
  var normUrl = (url).replace(/[?&]_cb=[^&]*/,'').replace(/[?&]usp=[^&]*/,'').trim();
  var keys = [];
  if (fileId) keys.push('fid:'+fileId);
  if (normUrl) keys.push(normUrl);
  if (url !== normUrl) keys.push(url);
  for (var i=0; i<keys.length; i++) {
    if (keys[i] && _photoThumbCache[keys[i]]) return _photoThumbCache[keys[i]];
  }
  try {
    var stored = JSON.parse(localStorage.getItem('dilaporkan_photo_cache')||'{}');
    for (var j=0; j<keys.length; j++) {
      var e = stored[keys[j]];
      if (e) {
        var t = typeof e === 'string' ? e : (e.thumb||'');
        if (t && t.startsWith('data:')) {
          keys.forEach(function(k){ if(k) _photoThumbCache[k]=t; });
          return t;
        }
      }
    }
  } catch(e2) {}
  return '';
}

// FIX: Ambil viewUrl dari cache localStorage (agar link "Lihat di Drive" tidak hilang)
function getCachedViewUrl(url) {
  if (!url) return '';
  var fileId = extractDriveId(url);
  var normUrl = (url).replace(/[?&]_cb=[^&]*/,'').replace(/[?&]usp=[^&]*/,'').trim();

    for (var i=0; i<keys.length; i++) {
      var e = stored[keys[i]];

  } catch(e2) {}
  return '';
}

// ================================================================
// SAFE PHOTOS – normalisasi field photos agar selalu Array
// Mencegah error ".map is not a function" / ".filter is not a function"
// ketika data lama menyimpan photos sebagai string (bukan JSON array)
// ================================================================
function safePhotos(p){
  if(!p) return [];
  if(Array.isArray(p)) return p;
  if(typeof p==='string'){
    if(p===''||p==='[]') return [];
    try{ const parsed=JSON.parse(p); return Array.isArray(parsed)?parsed:[]; }catch(e){}
    if(p.startsWith('http')) return [{url:p,viewUrl:p,label:'Foto'}];
    return [];
  }
  return [];
}

// ================================================================
// BUG FIX: Helper mendapatkan src foto terbaik dari semua sumber
// Prioritas: thumb/d lokal (base64) → cache localStorage → Drive thumbnail URL → url asli
// Ini mengatasi foto kosong setelah reload dari GAS (GAS tidak menyimpan base64)
// ================================================================
// v4.1: getPhotoSrc – gunakan /thumbnail?sz=w600 (accessible tanpa login di browser)
// KENAPA: drive.google.com/uc?export=view sering redirect ke login page ketika di-embed di <img>
// /thumbnail bekerja untuk file "Anyone with link" tanpa perlu sesi Google aktif
function getPhotoSrc(p){
  if(!p) return '';
  // 1. Base64 lokal (baru upload, belum disimpan ke Drive)
  if(p.thumb && p.thumb.startsWith('data:')) return p.thumb;
  if(p.d && p.d.startsWith('data:')) return p.d;
  // 2. Ekstrak fileId dari semua sumber
  var anyUrl = p.url || p.viewUrl || '';
  var fileId = (p.id&&String(p.id).length>=10?String(p.id):'')
    || (p.fileId&&String(p.fileId).length>=10?String(p.fileId):'')
    || extractDriveId(anyUrl) || '';
  // 3. FIX v4.1: gunakan /thumbnail (tidak butuh login, berfungsi langsung di <img>)
  if(fileId) return 'https://drive.google.com/thumbnail?id='+fileId+'&sz=w600';
  // 4. Fallback ke URL yang tersimpan
  if(p.url) return p.url;
  if(p.viewUrl) return p.viewUrl;
  return '';
}

// v3.8: renderPhotoGrid – tampil langsung via lh3 URL (CDN publik Google)
// onerror: fallback ke thumbnail Drive → link Drive
function renderPhotoGrid(photos, cols){
  var safeArr=safePhotos(photos);
  if(!safeArr||!safeArr.length)return '';
  var c=cols||3;
  var items=safeArr.map(function(p){
    var src=getPhotoSrc(p);
    var lbl=(p.label||p.l||'').replace(/"/g,'&quot;');
    var anyUrl=p.url||p.viewUrl||'';
    var fileId=(p.id&&String(p.id).length>=10?String(p.id):'')
      ||(p.fileId&&String(p.fileId).length>=10?String(p.fileId):'')
      ||extractDriveId(anyUrl)||'';
    // v4.1: fb1 = /thumbnail (tidak butuh login), fb2 = uc?export=view (fallback)
    var fb1=fileId?('https://drive.google.com/thumbnail?id='+fileId+'&sz=w600'):
            (anyUrl?driveThumbUrl(anyUrl):'');
    var fb2=fileId?('https://drive.google.com/uc?export=view&id='+fileId):'';
    var viewHref=p.viewUrl||(fileId?'https://drive.google.com/file/d/'+fileId+'/view':'')||'';
    var inner='';
    if(src){
      var imgTag='<img src="'+src+'" alt="'+lbl+'" '
        +'style="width:100%;height:100%;object-fit:cover;display:block" '
        +'data-fb1="'+fb1+'" data-fb2="'+fb2+'" data-view="'+viewHref+'" '
        +'data-tried="0" '
        +'onerror="photoFallback(this)">';
      inner=(viewHref?'<a href="'+viewHref+'" target="_blank" style="display:block;width:100%;height:100%">'+imgTag+'</a>':imgTag);
      if(lbl) inner+='<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:2px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+lbl+'</div>';
    } else {
      inner='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:5px;background:#f5f0eb">'
        +'<span style="font-size:22px">📷</span>'
        +(viewHref?'<a href="'+viewHref+'" target="_blank" style="font-size:9px;color:#6B1A1A;padding:2px 6px;background:#e8d5c4;border-radius:3px;text-decoration:none">Buka Drive</a>':'<span style="font-size:9px;color:#9C7B6E">Tidak ada foto</span>')
        +'</div>';
    }
    return '<div class="pt" style="position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#f5f5f5">'+inner+'</div>';
  }).join('');
  return '<div style="display:grid;grid-template-columns:repeat('+c+',1fr);gap:6px;margin-top:6px">'+items+'</div>';
}

// v3.8: photoFallback – coba URL cadangan satu per satu
function photoFallback(img){
  var tried=parseInt(img.dataset.tried||'0');
  var urls=[img.dataset.fb1,img.dataset.fb2].filter(Boolean);
  if(tried<urls.length && urls[tried]!==img.src){
    img.dataset.tried=String(tried+1);
    img.src=urls[tried];
    return;
  }
  // Semua gagal – tampilkan placeholder dengan link Drive
  img.style.display='none';
  var par=img.parentElement;
  if(par&&!par.querySelector('.ph-err')){
    var view=img.dataset.view||'';
    var ph=document.createElement('div');
    ph.className='ph-err';
    ph.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:#f5f0eb';
    ph.innerHTML='<span style="font-size:20px">📷</span>'
      +(view?'<a href="'+view+'" target="_blank" style="font-size:9px;color:#6B1A1A;padding:2px 6px;background:#e8d5c4;border-radius:3px;text-decoration:none">Buka Drive</a>':'<span style="font-size:9px;color:#9C7B6E">Foto di Drive</span>');
    par.appendChild(ph);
  }
}

// FIX: Saat buka modal edit, pulihkan viewUrl dan thumb setiap foto dari semua sumber cache

function prepareEditPhotos(photos) {
  return safePhotos(photos).filter(p => p.url || p.thumb || p.d).slice(0, 5).map(p => {
    const urlKey = (p.url || '').replace(/[&?]_cb=[^&]*/,'').trim();
    const resolvedViewUrl = p.viewUrl || getCachedViewUrl(urlKey) || p.url || '';
    const resolvedThumb = p.thumb || (urlKey ? getCachedThumb(urlKey) : '') || p.d || '';
    return { ...p, viewUrl: resolvedViewUrl, thumb: resolvedThumb };
  });
}

    app.innerHTML=`<div class="overlay-bg" id="sb-overlay"></div><div style="display:flex"><div class="sb">${rSb()}</div><div class="mc">${rTb()}${rAlert2()}<div class="pc">${rPage()}</div></div></div>${modalHtml}${rBottomNav()}`;
    bindAll();
  }catch(err){
    console.error('Render error:',err);
    // Coba render tanpa modal sebagai fallback
    try{
      S.modal=null;S.editItem=null;
      app.innerHTML=`<div class="overlay-bg" id="sb-overlay"></div><div style="display:flex"><div class="sb">${rSb()}</div><div class="mc">${rTb()}${rAlert2()}<div class="pc">${rPage()}</div></div></div>${rBottomNav()}`;
      bindAll();
      showAlert('⚠️ Ada error kecil (sudah dipulihkan): '+err.message,'er');
    }catch(e2){console.error('Fatal render error:',e2);}
  }
}

// Buka modal TANPA re-render seluruh halaman (lebih aman untuk modal edit)
function openModal(type, item){
  S.modal=type; S.editItem=item||null;

  const old=document.querySelector('.ov');
  if(old)old.remove();
  try{
    const html=rModal();
    if(!html)return;
    const tmp=document.createElement('div');
    tmp.innerHTML=html;
    const el=tmp.firstElementChild;
    if(el){document.getElementById('app').appendChild(el);bindAll();}
  }catch(err){
    console.error('openModal error:',err);
    showAlert('⚠️ Gagal buka modal: '+err.message,'er');
    S.modal=null;S.editItem=null;
  }
}

  // Kasi/Admin: target = 10*jumlah_operator (total semua operator)

  const tgt1=isOp?10:10*nOp, tgt2=isOp?4:4*nOp, tgt3=isOp?10:10*nOp, tgt4=isOp?10:10*nOp;

    </tbody></table></div>

      </tr>`).join('')}

  </div>`;

function rLaporan(type){
  const m=S.selMonth,y=S.selYear;
  const k=getKasi(),op12=getOp12(),op34=getOp34();
  const mNames=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
  const mon=parseInt(m.split('-')[1]);
  let months,title,periodLabel;
  if(type==='bulanan'){months=[m.split('-')[1]];title='Bulanan';periodLabel=monthName(m);}
  else if(type==='triwulan'){
    const q=Math.ceil(mon/3);
    months={1:['01','02','03'],2:['04','05','06'],3:['07','08','09'],4:['10','11','12']}[q];
    const qLabel={1:'Januari–Maret',2:'April–Juni',3:'Juli–September',4:'Oktober–Desember'};
    title=`Triwulan ${['I','II','III','IV'][q-1]}`;periodLabel=qLabel[q]+' '+y;
  } else {
    months=['01','02','03','04','05','06','07','08','09','10','11','12'];
    title='Tahunan';periodLabel='Tahun '+y;
  }
  const getS=(arr,ms)=>ms.map(mo=>{const mk=y+'-'+mo;const fl=arr.filter(e=>e.tgl&&e.tgl.startsWith(mk));return{mo:mk,c:fl.length,p:fl.flatMap(l=>l.photos||[]).length}});
  const i1s=getS(S.i1,months),i2s=getS(S.i2,months),i3s=getS(S.i3,months),i4s=getS(S.i4,months);
  const IKIs=[{l:'IKI 1 – Penyiapan Bahan & Konsumsi',s:i1s},{l:'IKI 2 – Penyajian Konsumsi kepada Klien',s:i2s},{l:'IKI 3 – Kebersihan Peralatan & Dapur',s:i3s},{l:'IKI 4 – Pemeriksaan Kondisi Sarpras',s:i4s}];
  const isAdminKasiR=S.user.role==='admin'||S.user.role==='kasi';
  const nOpLap=Math.max(1,S.users.filter(u=>u.role==='operator').length);
  const target=months.length*10*nOpLap; // target = 10 per bulan per operator
  return`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="card-ttl" style="margin:0;border:none;padding:0">📊 Laporan ${title} – ${periodLabel}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-a" id="btn-print-lap">🖨️ Cetak PDF Laporan</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(${months.length},1fr);gap:7px;margin-bottom:18px;overflow-x:auto">
      ${months.map((mo,i)=>{const mk=y+'-'+mo;const tot=(i1s[i]?.c||0)+(i2s[i]?.c||0)+(i3s[i]?.c||0)+(i4s[i]?.c||0);return`<div style="background:${tot>=40?'#EAFAF1':'#fff'};border:1px solid ${tot>=40?'#A9DFBF':'var(--bd)'};border-radius:8px;padding:9px;text-align:center;min-width:70px">
        <div style="font-size:9.5px;color:var(--tx3);margin-bottom:3px">${mNames[parseInt(mo)-1]}</div>
        <div style="font-size:17px;font-weight:700;color:${tot>=40?'var(--s)':'var(--p)'}">${tot}</div>
        <div style="font-size:9px;color:var(--tx3)">log</div>
      </div>`}).join('')}
    </div>
    <div class="tw"><table class="dt"><thead><tr><th>IKI</th>${months.map(mo=>`<th>${mNames[parseInt(mo)-1]}</th>`).join('')}<th>Total</th><th>Target</th><th>Capaian</th></tr></thead><tbody>
      ${IKIs.map(({l,s})=>{const tot=s.reduce((a,x)=>a+x.c,0);return`<tr><td><strong>${l}</strong></td>${s.map(x=>`<td style="text-align:center">${x.c}</td>`).join('')}<td style="text-align:center;font-weight:700">${tot}</td><td style="text-align:center">${target}</td><td><span class="bdg ${tot>=target?'b-ok':tot>=target*.7?'b-w':'b-no'}">${tot>=target?'✓ Tercapai':Math.round(tot/target*100)+'%'}</span></td></tr>`}).join('')}
    </tbody></table></div>
    <div style="margin-top:18px;background:var(--bg);border-radius:8px;padding:14px;font-size:12px">
      <strong style="color:var(--p)">Kesimpulan Evaluasi ${periodLabel}:</strong>
      <ul style="margin:8px 0 0 16px;line-height:1.9">
        <li>Total Penerima Manfaat: <strong>75 PM (30P + 45L)</strong> – 6 Asrama</li>
        <li>Siklus Menu: <strong>10 Hari Berulang</strong> – 3 Sesi Makan per Hari</li>
        <li>Total Sesi Makan Bulan Ini: <strong>${byMonth(S.i1,m).length*3} sesi</strong></li>
        <li>Seluruh kegiatan IKI berjalan sesuai standar pelayanan sosial yang ditetapkan</li>
        <li>Dokumentasi foto tersedia untuk seluruh kegiatan yang terlaksana</li>
      </ul>
    </div>
    ${isAdminKasiR?`
    <div style="margin-top:18px">
      <h4 style="font-family:'Lora',serif;color:var(--p);border-left:4px solid var(--a);padding-left:10px;margin-bottom:10px">📋 Rekap Per Operator</h4>
      <div class="tw"><table class="dt"><thead><tr><th>Nama Operator</th><th>Jabatan</th><th>IKI 1</th><th>IKI 2</th><th>IKI 3</th><th>IKI 4</th><th>Total</th></tr></thead><tbody>
        ${S.users.filter(u=>u.role==='operator').map(op=>{
          const fArr=(arr,nm)=>arr.filter(e=>(e.operator||e.petugas||'')===nm||(e.operator||e.petugas||'')===op.un);
          const allMonths=[...(months||[m.split('-')[1]])].map(mo=>y+'-'+mo);
          const f1=allMonths.reduce((a,mk)=>a+byMonth(S.i1,mk).filter(e=>e.operator===op.name||e.operator===op.un).length,0);
          const f2=allMonths.reduce((a,mk)=>a+byMonth(S.i2,mk).filter(e=>e.operator===op.name||e.operator===op.un).length,0);
          const f3=allMonths.reduce((a,mk)=>a+byMonth(S.i3,mk).filter(e=>e.petugas===op.name||e.petugas===op.un).length,0);
          const f4=allMonths.reduce((a,mk)=>a+byMonth(S.i4,mk).filter(e=>e.operator===op.name||e.operator===op.un).length,0);
          return`<tr><td><strong>${op.name}</strong></td><td style="font-size:11.5px">${op.jabatan}</td>
            <td style="text-align:center">${f1}</td><td style="text-align:center">${f2}</td>
            <td style="text-align:center">${f3}</td><td style="text-align:center">${f4}</td>
            <td style="text-align:center;font-weight:700">${f1+f2+f3+f4}</td></tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`:''}
    ${signRow(op12)}
  </div>`;
}

function rModal(){
  const t=S.modal;
  if(t==='i1'||t==='i1-edit')return rMI1();
  if(t==='i2'||t==='i2-edit')return rMI2();
  if(t==='i3'||t==='i3-edit')return rMI3();
  if(t==='i4'||t==='i4-edit')return rMI4();
  if(t==='usr'||t==='usr-edit')return rMUsr();
  if(typeof t==='object'&&t.type==='editmenu')return rMEditMenu(t.h);
  if(t==='i3alat')return rMI3Alat();
  if(t==='i3san')return rMI3San();
  if(t==='i4sarpras')return rMI4Sarpras();
  if(t==='i4stok')return rMI4Stok();
  if(t==='rusak')return rMRusak();
  if(t==='masalah')return rMMasalah();

  return'';
}

// ================================================================
// PRE-FETCH FOTO SEBELUM PRINT
// Solusi baru: TIDAK pakai popup/blob window baru.
// Print dilakukan via overlay di window yang SAMA sehingga
// cookie Google tetap aktif → foto Drive langsung tampil.
// preloadPhotosForPrint hanya menyiapkan _printSrc (Drive URL),
// tanpa konversi canvas-to-base64 yang rawan CORS.
// ================================================================
async function preloadPhotosForPrint(photoArr) {
  const results = [];
  for (const p of photoArr) {
    // BUG FIX: Gunakan getPhotoSrc() yang mengecek semua sumber termasuk localStorage cache
    // Ini mengatasi foto kosong di PDF setelah reload/sync GAS (GAS tidak menyimpan base64)
    const cachedSrc = getPhotoSrc(p);
    // Prioritas 1: thumb/d lokal base64 (sudah dihandle oleh getPhotoSrc)
    if (cachedSrc && cachedSrc.startsWith('data:')) { results.push({...p, _printSrc: cachedSrc}); continue; }
    // Prioritas 2: Drive thumbnail URL (cookie aktif di overlay window yang sama)
    const driveUrl = p.url ? driveThumbUrl(p.url) : (p.viewUrl ? driveThumbUrl(p.viewUrl) : '');
    // Gunakan cachedSrc (Drive URL dari getPhotoSrc) atau driveUrl sebagai fallback
    results.push({...p, _printSrc: cachedSrc || driveUrl || ''});
  }
  return results;
}

// ================================================================
// PRINT FUNCTIONS – Overlay di window yang sama (cookie aktif)
// ================================================================
function printPage(title, bodyHTML) {
  openPrintOverlay(title, bodyHTML);
}

function openPrintOverlay(title, bodyHTML) {
  // Hapus overlay lama jika ada
  const old = document.getElementById('print-overlay-root');
  if (old) old.remove();

  // Buat container overlay
  const overlay = document.createElement('div');
  overlay.id = 'print-overlay-root';
  overlay.style.cssText = [
    'position:fixed','inset:0','background:#fff','z-index:99999',
    'overflow-y:auto','padding:0','margin:0'
  ].join(';');

  // Tombol tutup (tidak muncul saat print)
  const closeBtn = document.createElement('button');
  closeBtn.id = 'print-overlay-close';
  closeBtn.textContent = '✕ Tutup';
  closeBtn.style.cssText = [
    'position:fixed','top:12px','right:16px','z-index:100000',
    'background:#6B1A1A','color:#fff','border:none','border-radius:8px',
    'padding:8px 16px','font-size:13px','cursor:pointer','font-family:sans-serif',
    'box-shadow:0 2px 8px rgba(0,0,0,0.3)'
  ].join(';');
  closeBtn.onclick = () => {
    overlay.remove();
    document.title = _prevTitle;
  };

  // Tombol cetak
  const printBtn = document.createElement('button');
  printBtn.id = 'print-overlay-print';
  printBtn.textContent = '🖨️ Cetak / Simpan PDF';
  printBtn.style.cssText = [
    'position:fixed','top:12px','right:140px','z-index:100000',
    'background:#C9962A','color:#3A0A0A','border:none','border-radius:8px',
    'padding:8px 16px','font-size:13px','cursor:pointer','font-weight:700',
    'font-family:sans-serif','box-shadow:0 2px 8px rgba(0,0,0,0.2)'
  ].join(';');
  printBtn.onclick = () => window.print();

  // Konten cetak dengan CSS
  const content = document.createElement('div');
  content.id = 'print-overlay-content';
  content.innerHTML = `<style>${PRINT_CSS_STR}
    /* Tambahan: dalam overlay semua elemen lain disembunyikan saat print */
    @media print {
      #print-overlay-close, #print-overlay-print { display:none!important; }
    }
  </style>${bodyHTML}`;

  overlay.appendChild(closeBtn);
  overlay.appendChild(printBtn);
  overlay.appendChild(content);
  document.body.appendChild(overlay);

  // Simpan judul asli, ganti sementara agar nama file PDF sesuai
  window._prevTitle = document.title;
  document.title = title;

  // Tunggu semua gambar siap sebelum menawarkan print
  const imgs = Array.from(overlay.querySelectorAll('img'));
  if (imgs.length === 0) return;
  let loaded = 0;
  const checkDone = () => { loaded++; /* tidak auto-print, user klik sendiri */ };
  imgs.forEach(img => {
    if (img.complete) { loaded++; return; }
    img.onload = checkDone;
    img.onerror = checkDone;
  });

  // Restore judul setelah print dialog tutup
  window.addEventListener('afterprint', function onAP() {
    document.title = window._prevTitle || document.title;
    window.removeEventListener('afterprint', onAP);
  });
}

function getBelanja(periode) {
  if(!S.i1_belanja||!S.i1_belanja.length) S.i1_belanja=[makeBelanjaPeriode(1),makeBelanjaPeriode(2),makeBelanjaPeriode(3)];
  // FIX: gunakan == (bukan ===) agar aman meski periode string vs number
  // Prioritaskan bulan aktif agar tidak ambil data bulan lain
  return S.i1_belanja.find(b=>b.periode==periode && (b.bulan===S.selMonth||!b.bulan))
      || S.i1_belanja.find(b=>b.periode==periode);
}

function updateBelanjaTgl(periode, jenis, val) {
  const bel=getBelanja(periode);
  if(!bel)return;
  if(jenis==='kering') bel.tgl_kering=val;
  S.i1_belanja=[...S.i1_belanja];
  // No full re-render needed (input already has value)
}

function updateBasahTgl(periode, pgId, val) {
  const bel=getBelanja(periode);
  if(!bel)return;
  const pg=bel.pengiriman_basah.find(p=>p.id===pgId);
  if(pg) pg.tgl=val;
  S.i1_belanja=[...S.i1_belanja];
}

function updateBahanItem(periode, tableId, itemId, field, val) {
  const bel=getBelanja(periode);
  if(!bel)return;
  let item;
  if(tableId==='kering'){
    item=bel.bahan_kering.find(x=>x.id===itemId);
  } else {
    const pgId=tableId.replace('basah_','');
    const pg=bel.pengiriman_basah.find(p=>p.id===pgId);
    if(pg) item=pg.items.find(x=>x.id===itemId);
  }
  if(item) item[field]=val;
  S.i1_belanja=[...S.i1_belanja];
  S._belanjaSaveAllowed = true;
  saveSession(); // FIX: simpan ke sessionStorage segera setiap edit
  queueSaveBelanja(); // auto-save ke GAS setelah 3 detik
}

function addBahanItem(periode, jenis) {
  const bel=getBelanja(periode);
  if(!bel)return;
  const newItem={id:'k'+periode+'_c'+Date.now(),nama:'',jml:'',sat:'',sudah:'',belum:'',ket:''};
  if(jenis==='kering'){
    bel.bahan_kering=[...bel.bahan_kering,newItem];
    // Append row langsung ke tabel tanpa re-render penuh
    const tbody=document.querySelector('#kering tbody');
    if(tbody){
      const i=bel.bahan_kering.length-1;
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="text-align:center">${i+1}</td>
        <td><input type="text" class="fc" style="padding:4px 6px" value="" onchange="updateBahanItem(${periode},'kering','${newItem.id}','nama',this.value)"></td>

        <td><input type="text" class="fc" style="padding:4px 6px;text-align:center" placeholder="jumlah" value="" onchange="updateBahanItem(${periode},'kering','${newItem.id}','belum',this.value)"></td>

      tr.querySelector('input').focus();

    setState({i1_belanja:[...S.i1_belanja]});
  }
}

function delBahanItem(periode, tableId, itemId) {

async function delPengirimanBasah(periode, pgId) {
  if(!await confirmDialog('Hapus pengiriman ini?'))return;
  const bel=getBelanja(periode);
  if(!bel)return;
  bel.pengiriman_basah=bel.pengiriman_basah.filter(p=>p.id!==pgId);
  S._belanjaSaveAllowed = true; // user confirm hapus → izinkan save
  setState({i1_belanja:[...S.i1_belanja]});
}

async function resetBelanjaPeriode(periode) {
  if(!await confirmDialog('Reset pembelian '+periode+' ke data default? Data yang diisi akan hilang.'))return;
  const newPer=makeBelanjaPeriode(periode);
  newPer.bulan=S.selMonth;
  // Cari entry dengan periode dan bulan yang sama
  const idx=S.i1_belanja.findIndex(b=>b.periode===periode&&(b.bulan===S.selMonth||!b.bulan));
  if(idx>=0) S.i1_belanja[idx]=newPer;
  else S.i1_belanja.push(newPer);
  setState({i1_belanja:[...S.i1_belanja]});
}

// Simpan Belanja ke GAS
async function saveBelanja() {
  if(!S.i1_belanja||!S.i1_belanja.length) return;
  // Hanya kirim belanja untuk bulan aktif
  const belanjaBulanIni=(S.i1_belanja||[]).filter(b=>!b.bulan||b.bulan===S.selMonth);
  if(!belanjaBulanIni.length) return;

  // ================================================================
  // PROTEKSI v3.7: Jangan auto-save jika data belum benar-benar diisi
  // atau jika jumlah pengiriman lebih sedikit dari yang ter-load dari GAS.
  // Cegah data 5-6 pengiriman tertimpa oleh save saat kondisi default (1 pengiriman).
  // ================================================================
  const totalPengiriman = belanjaBulanIni.reduce((sum,b)=>sum+(b.pengiriman_basah||[]).length,0);
  // FIX: deteksi edit nama/jml/sat vs default — bukan hanya sudah/belum/ket
  const hasRealContent = belanjaBulanIni.some(b=>(
    (b.pengiriman_basah||[]).length > 1 ||
    (b.pengiriman_basah||[]).some(pg=>pg.tgl||(pg.items||[]).some(it=>it.sudah||it.belum||it.ket)) ||
    (b.bahan_kering||[]).some(it=>it.sudah||it.belum||it.ket) ||
    b.tgl_kering ||
    (b.bahan_kering||[]).some((it,i)=>{const d=BAHAN_KERING_DEF[i];return d&&(it.nama!==d.nama||String(it.jml)!==String(d.jml)||it.sat!==d.sat);}) ||
    (b.pengiriman_basah||[]).some(pg=>(pg.items||[]).some((it,i)=>{const d=BAHAN_BASAH_DEF[i];return d&&(it.nama!==d.nama||String(it.jml)!==String(d.jml)||it.sat!==d.sat);}))
  ));
  // Jika data masih default (1 pengiriman, semua kosong) DAN belum pernah di-confirm manual → skip
  if(!hasRealContent && !S._belanjaSaveAllowed){
    console.warn('[saveBelanja] Skip: data masih default, menunggu konfirmasi dari pengguna atau load GAS.');
    return;
  }
  // Proteksi: jika jumlah pengiriman berkurang drastis dari state yang pernah di-load → warn
  if(S._belanjaMaxPengiriman && totalPengiriman < S._belanjaMaxPengiriman && !S._belanjaSaveAllowed){
    console.warn('[saveBelanja] Skip: pengiriman berkurang ('+totalPengiriman+'<'+S._belanjaMaxPengiriman+'). Tunggu interaksi user.');
    return;
  }

  // Pastikan field bulan dan nip user benar di setiap item
  const payload=belanjaBulanIni.map(b=>({...b,bulan:S.selMonth,nip:S.user.nip,operator:S.user.name}));

var _bahanStatusTimer = null;

function setBahanStatus(id, status) {
  if (id.startsWith('def_')) {
    if (!S.i1_bahan_status) S.i1_bahan_status = {};
    S.i1_bahan_status[id] = status;
  } else {
    S.i1_bahan_custom = S.i1_bahan_custom.map(b => b.id === id ? {...b, status} : b);
  }
  // Re-render just the badge for this item without full re-render
  const rows = document.querySelectorAll('[data-bahan="' + id + '"]');
  rows.forEach(r => {
    const badge = r.closest('tr').querySelector('.bdg');
    if (badge) {
      badge.className = 'bdg ' + (status === 'ok' ? 'b-ok' : 'b-no');
      badge.textContent = status === 'ok' ? '✓ Tersedia' : '✕ Tidak Ada';
    }
  });
  // SYNC: simpan ke GAS agar sinkron antar device & bulan (debounce 1.5 detik)
  clearTimeout(_bahanStatusTimer);
  _bahanStatusTimer = setTimeout(() => {
    if (!S.user || !GAS_URL) return;
    gasSavePost('saveBahanStatus', {
      bulan:  S.selMonth,
      nip:    S.user.nip,
      status: S.i1_bahan_status
    });
  }, 1500);
}

// Dynamic extra item row for checklist modals
function addExtraItemRow(containerId, fields) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const idx = container.children.length;
  const div = document.createElement('div');
  div.style.cssText = 'display:grid;grid-template-columns:' + fields.map(() => '1fr').join(' ') + ';gap:6px;margin-bottom:6px;align-items:center';
  div.dataset.idx = idx;
  div.innerHTML = fields.map((f, i) => {
    if (f.type === 'text') return '<input type="text" class="fc" placeholder="' + f.ph + '" data-field="' + f.key + '">';
    if (f.type === 'number') return '<input type="number" inputmode="numeric" class="fc" placeholder="' + f.ph + '" value="' + (f.def || 0) + '" data-field="' + f.key + '">';
    if (f.type === 'select') return '<select class="fc" data-field="' + f.key + '">' + f.opts.map(o => '<option>' + o + '</option>').join('') + '</select>';
    return '';
  }).join('') + '<button type="button" class="btn btn-d btn-sm" onclick="this.parentElement.remove()">✕</button>';
  container.appendChild(div);
}

function getExtraRows(containerId, fields) {
  const container = document.getElementById(containerId);
  if (!container) return [];
  return Array.from(container.children).map(row => {
    const obj = {};
    fields.forEach(f => {
      const el = row.querySelector('[data-field="' + f.key + '"]');
      if (el) obj[f.key] = el.value;
    });
    return obj;
  });
}

// CORE FIX: extractDriveId - ekstrak Google Drive file ID dari semua format URL
function extractDriveId(url) {
  if (!url || typeof url !== 'string') return '';
  var m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]{10,})/);
  if (m1) return m1[1];
  var m2 = url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if (m2) return m2[1];
  var m3 = url.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]{10,})/);
  if (m3) return m3[1];
  var m4 = url.match(/\/d\/([a-zA-Z0-9_-]{10,})/);
  if (m4) return m4[1];
  return '';
}

// Convert Drive URL ke format embeddable (thumbnail)
function driveThumbUrl(url) {
  if (!url) return '';
  // Extract file ID dari berbagai format Drive URL
  let id = '';
  const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const m3 = url.match(/lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/);
  const m4 = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m1) id = m1[1];
  else if (m2) id = m2[1];
  else if (m3) id = m3[1];
  else if (m4) id = m4[1];
  // v4.0: gunakan uc?export=view – tidak butuh login browser seperti /thumbnail
  if (id) return 'https://drive.google.com/uc?export=view&id='+id;
  return url;
}



// Kompres gambar sebelum upload ke Drive
async function compressImage(dataUrl, maxPx=1024, quality=0.8) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w=img.width, h=img.height;
      if(w>maxPx||h>maxPx){
        if(w>h){h=Math.round(h*(maxPx/w));w=maxPx;}
        else{w=Math.round(w*(maxPx/h));h=maxPx;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

// Helper: tampilkan loading state saat delete berlangsung
function delWithLoading(el, gasFn, payload, stateKey, filterId, successMsg) {
  const orig=el.innerHTML;
  el.disabled=true; el.innerHTML='⏳';el.style.opacity='0.6';
  return gasSavePost(gasFn, payload).then(r=>{
    if(r.success){
      S[stateKey]=S[stateKey].filter(x=>String(x.id)!==filterId);
      setState({[stateKey]:S[stateKey]});
      showAlert(successMsg);
    } else {
      el.disabled=false;el.innerHTML=orig;el.style.opacity='';
      showAlert('Gagal hapus: '+(r.error||'error'),'er');
    }
  }).catch(err=>{
    el.disabled=false;el.innerHTML=orig;el.style.opacity='';
    showAlert('Error: '+err.message,'er');
  });
}

  }
}

async function doLogin(){
  const u = document.getElementById('inp-u').value.trim();
  const p = document.getElementById('inp-p').value;
  if(!u||!p){
    const e=document.getElementById('login-err');
    if(e){e.style.display='block';e.textContent='❌ Username dan password wajib diisi.';}
    return;
  }
  const btnLogin = document.getElementById('btn-login');
  const loading  = document.getElementById('login-loading');
  const errEl    = document.getElementById('login-err');
  if(btnLogin){btnLogin.disabled=true;btnLogin.innerHTML='⏳ Memverifikasi...';}
  if(loading) loading.style.display='block';
  if(errEl)   errEl.style.display='none';

  try {
    let found = null;

    if(GAS_URL){
      // Verifikasi LANGSUNG ke GAS Spreadsheet
      const res = await gasPost('login', {username:u, password:p});
      if(res.success && res.data) {
        found = res.data; // {id,name,un,nip,nipT,role,jabatan,unit}
        // Update local users list dari GAS (tanpa simpan pw)
        const usersFromGAS = await gasGet('getUsers',{});
        if(usersFromGAS && usersFromGAS.length) {
          S.users = usersFromGAS.map(x=>({
            ...x, pw: DEFAULT_USERS.find(d=>d.id==x.id)?.pw||''
          }));
        }
      } else if(res.error) {
        throw new Error(res.error||'Login gagal');
      }
    } else {
      // Fallback lokal: hanya jika tidak ada koneksi GAS dan pw lokal tersedia (dev mode)
      found = S.users.find(x=>x.un===u&&x.pw&&x.pw===p);
      if(!found) throw new Error('Tidak dapat terhubung ke server. Periksa koneksi internet.');
    }

    if(found){
      btnLogin.disabled=false; btnLogin.innerHTML='🔐 Masuk ke Sistem';
      loading.style.display='none';
      Object.assign(S,{user:found, page:'dashboard'});
      saveSession();
      prunePhotoCache(); // FIX: bersihkan cache foto jika terlalu besar
      render();
      // Sync offline queue jika ada data yang tertunda
      updateOfflineBadge();
      if (navigator.onLine && getOfflineQueue().length > 0) syncOfflineQueue();
      // FIX: sedikit jeda agar GAS commit sempurna sebelum dibaca
      await new Promise(r=>setTimeout(r,800));
      await loadFromGAS(S.selMonth);
    } else {
      throw new Error('Username atau password salah.');
    }
  } catch(err) {
    if(btnLogin){btnLogin.disabled=false;btnLogin.innerHTML='🔐 Masuk ke Sistem';}
    if(loading) loading.style.display='none';
    if(errEl){errEl.style.display='block';errEl.textContent='❌ '+err.message;}
  }
}

  // PENTING: tangkap editId SEBELUM async – mencegah data baru saat upload foto lambat
  const editId = S.editItem ? String(S.editItem.id) : null;
  const tgl=v('f-tgl'),kat=v('f-kat'),item=v('f-item'),kondisi=v('f-kondisi'),prioritas=v('f-prior'),tindakan=v('f-tindakan'),status=v('f-status'),catatan=v('f-catatan');
  if(!tgl){showAlert('Tanggal wajib diisi','er');return}
  const btn=document.getElementById('btn-save-i4');
  if(btn){btn.disabled=true;btn.textContent='⏳ Menyimpan...';}
  try{
    const photos=await uploadAllPhotos('IKI4_'+tgl);
    const tglI4=tgl||(editId?S.i4.find(x=>String(x.id)===editId)?.tgl:'')||today();
    const entry={id:editId||gid(),tgl:tglI4,kat:kat?kat.charAt(0):'A',item,kondisi,prioritas:prioritas?prioritas.charAt(0):'R',tindakan,status,catatan,ada_masalah:vc('f-masalah'),akses:vc('f-akses'),photos,operator:S.user.name,operator_nip:S.user.nip};
    const res=await gasSavePost('saveIKI4',{entry});
    if(res.success){
      const newI4=editId?S.i4.map(x=>String(x.id)===editId?entry:x):[...S.i4,entry];
      setState({i4:newI4,modal:null,editItem:null});tempPhotos=[];
      showAlert('✅ Log pengecekan tersimpan ke Spreadsheet');
    } else { showAlert('Gagal simpan: '+(res.error||'error'),'er'); }
  }catch(e){showAlert('Error: '+e.message,'er');}
  finally{if(btn){btn.disabled=false;btn.textContent='💾 Simpan Log Pengecekan';}}
}

async function saveUser(){
  const name=v('f-name'),un=v('f-un'),pw=v('f-pw'),nip=v('f-nip'),nipT=v('f-nipt'),role=v('f-role'),unit=v('f-unit'),jabatan=v('f-jabatan'),email=v('f-email');
  if(!name||!un){showAlert('Nama dan username wajib diisi','er');return}
  const btn=document.getElementById('btn-save-usr');
  if(btn){btn.disabled=true;btn.textContent='⏳ Menyimpan...';}
  try{
    if(S.editItem){
      const upd={...S.editItem,name,un,nip,nipT,role,unit,jabatan,email};
      if(pw) upd.pw=pw;
      const res=await gasSavePost('saveUser',{user:{id:S.editItem.id,name,un,pw:pw||'',nip,nipT,role,unit,jabatan,email}});
      if(res.success){
        setState({users:S.users.map(x=>x.id===S.editItem.id?upd:x),modal:null,editItem:null});
        showAlert('✅ Pengguna berhasil diperbarui');
      }else{showAlert('Gagal: '+(res.error||'error'),'er');}
    }else{
      if(!pw){showAlert('Password wajib diisi untuk pengguna baru','er');return}
      const u={id:Date.now(),name,un,pw,nip,nipT,role,unit,jabatan,email};
      const res=await gasSavePost('saveUser',{user:u});
      if(res.success){
        setState({users:[...S.users,u],modal:null,editItem:null});
        showAlert('✅ Pengguna berhasil ditambahkan');
      }else{showAlert('Gagal: '+(res.error||'error'),'er');}
    }
  }catch(e){showAlert('Error: '+e.message,'er');}
  finally{if(btn){btn.disabled=false;btn.textContent='💾 Simpan Pengguna';}}
}

// ================================================================
// ONLINE/OFFLINE DETECTION
// ================================================================
function updateOnlineStatus() {
  const existing = document.getElementById('offline-banner');
  if (!navigator.onLine) {
    if (!existing) {
      const banner = document.createElement('div');
      banner.id = 'offline-banner';
      banner.className = 'offline-badge no-print';
      banner.innerHTML = '📶 Tidak ada koneksi – data tersimpan lokal';
      document.body.appendChild(banner);
    }
  } else {
    if (existing) existing.remove();
  }
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);

})();
